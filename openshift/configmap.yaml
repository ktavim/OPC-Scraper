apiVersion: v1
kind: ConfigMap
metadata:
  name: hosts-scraper-config
  labels:
    app: hosts-scraper
data:
  config.json: |
    {
      "start_url": "https://example.com",
      "max_depth": 3,
      "max_clicks_per_page": 20,
      "wait_timeout": 30000,
      "network_idle_timeout": 2000,
      "http_credentials": {
        "username_env": "HTTP_USERNAME",
        "password_env": "HTTP_PASSWORD"
      },
      "form_filling": {
        "enabled": true,
        "fill_delay": 100,
        "defaults": {}
      },
      "exclude_patterns": ["logout", "delete", "remove", "login", "signin"],
      "login": {
        "login_url": "https://example.com/login",
        "username_env": "APP_USERNAME",
        "password_env": "APP_PASSWORD",
        "username_selector": "#username",
        "password_selector": "input[type='password']",
        "submit_selector": "button[type='submit']",
        "post_login_wait_ms": 3000,
        "storage_state_path": "/tmp/storage_state.json",
        "reuse_storage_state": true
      }
    }
