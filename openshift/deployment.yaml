apiVersion: apps/v1
kind: Deployment
metadata:
  name: hosts-scraper
  labels:
    app: hosts-scraper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hosts-scraper
  template:
    metadata:
      labels:
        app: hosts-scraper
    spec:
      serviceAccountName: hosts-scraper
      containers:
        - name: scraper
          image: image-registry.openshift-image-registry.svc:5000/REPLACE_NAMESPACE/hosts-scraper:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SCRAPER_CONFIG_PATH
              value: /etc/scraper/config.json
            - name: SCRAPER_MAX_PARALLEL
              value: "2"
            # Credentials are sourced from the `hosts-scraper-credentials`
            # Kubernetes Secret, which must exist in the same namespace.
            - name: HTTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hosts-scraper-credentials
                  key: http_username
            - name: HTTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hosts-scraper-credentials
                  key: http_password
            - name: APP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hosts-scraper-credentials
                  key: app_username
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hosts-scraper-credentials
                  key: app_password
          volumeMounts:
            - name: config
              mountPath: /etc/scraper
              readOnly: true
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: config
          configMap:
            name: hosts-scraper-config
        - name: tmp
          emptyDir: {}
