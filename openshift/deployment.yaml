apiVersion: apps/v1
kind: Deployment
metadata:
  name: hosts-scraper
  labels:
    app: hosts-scraper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hosts-scraper
  template:
    metadata:
      labels:
        app: hosts-scraper
    spec:
      serviceAccountName: hosts-scraper
      containers:
        - name: scraper
          image: image-registry.openshift-image-registry.svc:5000/REPLACE_NAMESPACE/hosts-scraper:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SCRAPER_CONFIG_PATH
              value: /etc/scraper/config.json
            - name: SCRAPER_MAX_PARALLEL
              value: "2"
            - name: VAULT_ADDR
              value: https://vault.vault.svc:8200
            - name: VAULT_ROLE
              value: hosts-scraper
            - name: VAULT_K8S_MOUNT
              value: kubernetes
            - name: VAULT_KV_MOUNT
              value: secret
          volumeMounts:
            - name: config
              mountPath: /etc/scraper
              readOnly: true
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: config
          configMap:
            name: hosts-scraper-config
        - name: tmp
          emptyDir: {}
